<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify LLM Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='llm-style.css') }}">
</head>
<body>
    <div class="content-wrap">
        <div class="page-header">
            <div class="website-title">
            <a href="/" class="logo-link">
                    <img src="{{ url_for('static', filename='images/spotify-icon.png') }}" class="spotify-icon">
                    <h2>Spotify Listening <span class="highlight">Analyzer</span></h2>
                </a>
            </div>

            <a href="/" class="new-analysis-btn">
                <svg class="plus-icon" viewBox="7 7 10 10" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 7.5v9"></path>
                    <path d="M7.5 12h9"></path>
                </svg>
                <span>New Analysis</span>
            </a>
        </div>
        
        <div class="page-title">
            <h1><span class="highlight">Ask AI</span> About Your Listening History</h1>
        </div>

        <div class="chat-box-container">
            <div id="chat-box" class="chat-box"></div>

            <div class="input-wrapper">
                <textarea
                    id="user-question"
                    class="question-input"
                    rows="1"
                    placeholder="Ask something like: What was my top song on July 4th, 2025?"
                ></textarea> 

                <button class="question-input-button" onclick="sendQuestion()">
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20V6"></path>
                        <path d="M6 12l6-6 6 6"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script>
        const input = document.getElementById("user-question");

        // Function to send question when enter key is pressed
        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                sendQuestion();
            }
        });

        // Autoscroll helper function
        function scrollToBottom() {
            const chatBox = document.getElementById("chat-box");
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendQuestion() {
            const chatBox = document.getElementById("chat-box");
            const question = input.value;

            if (!question) return;

            document.getElementById("chat-box").innerHTML += `
                <div class="message user" style="text-align: right; margin-bottom: 10px;">
                    <div class="bubble">${question}</div>
                </div>
            `;

            const typingId = "llm-thinking-indicator";
            chatBox.innerHTML += `
                <div class="message llm" id="${typingId}">
                    <div class="bubble typing">
                        <div class="spinner"></div>
                        <span class="typing-text">Processing your request...</span>
                    </div>
                </div>
            `;

            scrollToBottom();

            input.value = "";
            
            try {
                const response = await fetch("/ask-llm", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                const typingEl = document.getElementById(typingId);
                typingEl.outerHTML = `
                    <div class="message llm" style="text-align: left; margin-bottom: 10px;">
                        <div class="bubble">${data.answer}</div>
                    </div>
                `;
                } catch (error) {
                    document.getElementById(typingId).remove();
                }    

            scrollToBottom();
        }
    </script>
</body>
</html>
